---
- name: Install Node Exporter
  hosts: proxmox:control
  become: true
  tasks:
    - name: Download node exporter
      shell: |
        wget https://github.com/prometheus/node_exporter/releases/download/v1.8.0/node_exporter-1.8.0.linux-amd64.tar.gz -O /tmp/node_exporter.tar.gz
        tar xzf /tmp/node_exporter.tar.gz -C /tmp
        mv /tmp/node_exporter-1.8.0.linux-amd64/node_exporter /usr/local/bin/
      args:
        creates: /usr/local/bin/node_exporter

    - name: Create node exporter service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=root
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target

    - name: Start node exporter
      systemd:
        name: node_exporter
        enabled: yes
        state: started
        daemon_reload: yes
