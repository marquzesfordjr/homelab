---
- name: Deploy Stremio Server
  hosts: stremio
  become: true
  tasks:
    - name: Create stremio directory
      file:
        path: /opt/stremio/data
        state: directory

    - name: Deploy docker-compose
      copy:
        dest: /opt/stremio/docker-compose.yml
        content: |
          services:
            stremio:
              image: stremio/server:latest
              container_name: stremio
              restart: unless-stopped
              ports:
                - 11470:11470
                - 12470:12470
              volumes:
                - /opt/stremio/data:/root/.stremio-server
              environment:
                - NO_CORS=1

            mediafusion:
              image: mhdzumair/mediafusion:latest
              container_name: mediafusion
              restart: unless-stopped
              ports:
                - 8000:8000
              environment:
                - POSTGRES_URI=postgresql+asyncpg://mediafusion:mediafusion@mediafusion-db/mediafusion
                - REDIS_URL=redis://mediafusion-redis:6379
                - SECRET_KEY=homelab1234567890123456789012345
                - API_PASSWORD=homelab123
                - CONTACT_EMAIL=marquzesford@gmail.com
                - HOST_URL=http://192.168.137.210:8000
                - ADDON_URL=http://192.168.137.210:8000
              depends_on:
                - mediafusion-db
                - mediafusion-redis

            mediafusion-db:
              image: postgres:16-alpine
              container_name: mediafusion-db
              restart: unless-stopped
              environment:
                - POSTGRES_PASSWORD=mediafusion
                - POSTGRES_USER=mediafusion
                - POSTGRES_DB=mediafusion
              volumes:
                - /opt/stremio/postgresql:/var/lib/postgresql/data

            mediafusion-redis:
              image: redis:alpine
              container_name: mediafusion-redis
              hostname: redis-service
              restart: unless-stopped

    - name: Start stremio
      shell: docker compose up -d
      args:
        chdir: /opt/stremio
