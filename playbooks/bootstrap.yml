---
- name: Bootstrap all hosts
  hosts: all
  become: true

  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - ufw
          - fail2ban
          - unattended-upgrades
          - python3
          - python3-pip
        state: present

    - name: Enable ufw and allow SSH
      ufw:
        rule: allow
        name: OpenSSH

    - name: Enable ufw
      ufw:
        state: enabled

    - name: Enable fail2ban
      service:
        name: fail2ban
        state: started
        enabled: yes
