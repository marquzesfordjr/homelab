---
- name: Deploy Nextcloud
  hosts: nextcloud
  become: true
  tasks:
    - name: Create nextcloud directories
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - /opt/nextcloud
        - /opt/nextcloud/data
        - /opt/nextcloud/db

    - name: Deploy docker-compose
      copy:
        dest: /opt/nextcloud/docker-compose.yml
        content: |
          services:
            db:
              image: mariadb:10.11
              container_name: nextcloud-db
              restart: unless-stopped
              volumes:
                - /opt/nextcloud/db:/var/lib/mysql
              environment:
                - MYSQL_ROOT_PASSWORD=nextcloudroot
                - MYSQL_DATABASE=nextcloud
                - MYSQL_USER=nextcloud
                - MYSQL_PASSWORD=nextcloudpass

            nextcloud:
              image: nextcloud:latest
              container_name: nextcloud
              restart: unless-stopped
              ports:
                - 8080:80
              volumes:
                - /opt/nextcloud/data:/var/www/html
              environment:
                - MYSQL_HOST=db
                - MYSQL_DATABASE=nextcloud
                - MYSQL_USER=nextcloud
                - MYSQL_PASSWORD=nextcloudpass
                - NEXTCLOUD_ADMIN_USER=admin
                - NEXTCLOUD_ADMIN_PASSWORD=homelab123
                - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.home.arpa 10.20.0.208
              depends_on:
                - db

    - name: Start nextcloud
      shell: docker compose up -d
      args:
        chdir: /opt/nextcloud
