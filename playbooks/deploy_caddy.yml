---
- name: Deploy Caddy
  hosts: caddy
  become: true
  tasks:
    - name: Create caddy directory
      file:
        path: /opt/caddy
        state: directory

    - name: Deploy Caddyfile
      copy:
        dest: /opt/caddy/Caddyfile
        content: |
          {
            local_certs
          }
          vaultwarden.home.arpa {
            reverse_proxy 10.20.0.201:8080
          }
          grafana.home.arpa {
            reverse_proxy 10.20.0.204:3000
          }
          prometheus.home.arpa {
            reverse_proxy 10.20.0.205:9090
          }
          uptime.home.arpa {
            reverse_proxy 10.20.0.206:3001
          }
          glance.home.arpa {
            reverse_proxy 10.20.0.203:8080
          }
          homeassistant.home.arpa {
            reverse_proxy 10.20.0.202:8123
          }
          nextcloud.home.arpa {
            reverse_proxy 10.20.0.208:80
          }
          adguard.home.arpa {
            reverse_proxy 10.20.0.50:3000
          }

    - name: Deploy docker-compose
      copy:
        dest: /opt/caddy/docker-compose.yml
        content: |
          services:
            caddy:
              image: caddy:latest
              container_name: caddy
              restart: unless-stopped
              network_mode: host
              volumes:
                - /opt/caddy/Caddyfile:/etc/caddy/Caddyfile
                - /opt/caddy/data:/data
                - /opt/caddy/config:/config

    - name: Start caddy
      shell: docker compose up -d
      args:
        chdir: /opt/caddy
